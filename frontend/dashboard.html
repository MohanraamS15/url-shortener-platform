<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-icon">URL</div>
      <span class="logo-text">URL - Short</span>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-name">—</span>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="dashboard-main">

    <div class="page-heading">
      <h1>Shorten a URL</h1>
      <p>Paste a long link and get a clean short one instantly.</p>
    </div>

    <!-- Shorten form -->
    <div class="shorten-card">
      <div id="form-msg" class="msg"></div>
      <form id="url-form" novalidate>
        <div class="url-input-row">
          <input
            type="url"
            id="url"
            placeholder="https://your-long-url.com/goes/here"
            autocomplete="off"
            required
          />
          <button type="submit" class="btn btn-primary" id="shorten-btn">
            Shorten
          </button>
        </div>
      </form>
    </div>

    <!-- Result -->
    <div id="result"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
