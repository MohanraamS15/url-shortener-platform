<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">URL</div>
      <span class="logo-text">URL - Short</span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Start shortening links in seconds.</p>

    <div id="msg" class="msg"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Mohan" autocomplete="name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top:8px;">
        Create account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="index.html">Sign in</a>
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
