<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">URL</div>
      <span class="logo-text">URL - Short</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage your short links.</p>

    <div id="msg" class="msg"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top:8px;">
        Sign in
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
